<!DOCTYPE html>
<html>
<head>
    <title>Email Spam Checker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>Email Spam Detection</h1>
    <p class="subtitle">Check whether an email is Spam or Ham</p>

    <form method="POST">
        <textarea name="email" placeholder="Paste email text here..." required></textarea>
        <button type="submit">Check Email</button>
    </form>

    {% if result %}
        <div class="result {{ result|lower }}">
            Result: {{ result }}
        </div>
    {% endif %}
</div>

</body>
</html>
